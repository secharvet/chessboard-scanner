# Podman Compose (compatible docker-compose.yml)
# Usage :
#   ./scripts/collect-pgn.sh
#   ./scripts/dev.sh          # dev : edit → F5 (volumes, pas de rebuild)
#   ./scripts/start-web.sh    # prod : image figée

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-6400}:80"
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ./data/pgn:/data/pgn:ro,Z
    restart: unless-stopped

  collector:
    build:
      context: ./collector
    volumes:
      - ./data/pgn:/data/pgn:Z
      - ./collector/sources:/app/sources:ro,Z
    environment:
      # IDs d'études Lichess publiques (virgules) — ex. depuis l'URL lichess.org/study/XXXX
      LICHESS_STUDY_IDS: ${LICHESS_STUDY_IDS:-}
      # URLs directes vers des .pgn (virgules)
      PGN_URLS: ${PGN_URLS:-}
