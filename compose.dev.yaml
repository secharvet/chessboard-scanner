# Override dev : HTML/JS/CSS montés depuis le repo (F5 = à jour).
# Vendor (chess.js, Stockfish) reste dans l'image — rebuild seulement si docker/web/package.json change.
#
#   ./scripts/dev.sh
#   make dev
#
# ⚠️ Nouveau module JS racine → ajouter une ligne ./monfichier.js ci-dessous.
#    Les répertoires (positional/, assets/) sont montés entièrement : pas besoin de lister les sous-fichiers.

services:
  web:
    volumes:
      - ./docker/web/nginx.conf:/etc/nginx/conf.d/default.conf:Z
      - ./data/pgn:/data/pgn:ro,Z
      # HTML / CSS
      - ./index.html:/usr/share/nginx/html/index.html:Z
      - ./play.html:/usr/share/nginx/html/play.html:Z
      - ./test-stockfish.html:/usr/share/nginx/html/test-stockfish.html:Z
      - ./style.css:/usr/share/nginx/html/style.css:Z
      - ./play.css:/usr/share/nginx/html/play.css:Z
      # JS — modules racine
      - ./app.js:/usr/share/nginx/html/app.js:Z
      - ./pgn-graph.js:/usr/share/nginx/html/pgn-graph.js:Z
      - ./board-view.js:/usr/share/nginx/html/board-view.js:Z
      - ./board-drawables.js:/usr/share/nginx/html/board-drawables.js:Z
      - ./comment-drawables.js:/usr/share/nginx/html/comment-drawables.js:Z
      - ./fen-board-renderer.js:/usr/share/nginx/html/fen-board-renderer.js:Z
      - ./play.js:/usr/share/nginx/html/play.js:Z
      - ./play-board.js:/usr/share/nginx/html/play-board.js:Z
      - ./square-control.js:/usr/share/nginx/html/square-control.js:Z
      - ./stockfish-client.js:/usr/share/nginx/html/stockfish-client.js:Z
      - ./eval-fr.js:/usr/share/nginx/html/eval-fr.js:Z
      - ./mentor-client.js:/usr/share/nginx/html/mentor-client.js:Z
      - ./mentor-markdown.js:/usr/share/nginx/html/mentor-markdown.js:Z
      - ./mentor-ui.js:/usr/share/nginx/html/mentor-ui.js:Z
      # JS — répertoires entiers (tout sous-fichier ajouté automatiquement au F5)
      - ./positional:/usr/share/nginx/html/positional:Z
      # Statique
      - ./assets:/usr/share/nginx/html/assets:Z
