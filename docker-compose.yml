# Alias conservé pour compatibilité — préférer compose.yaml avec Podman
services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./data/pgn:/data/pgn:ro,Z
    restart: unless-stopped

  collector:
    build:
      context: ./collector
    volumes:
      - ./data/pgn:/data/pgn:Z
      - ./collector/sources:/app/sources:ro,Z
    environment:
      LICHESS_STUDY_IDS: ${LICHESS_STUDY_IDS:-}
      PGN_URLS: ${PGN_URLS:-}
